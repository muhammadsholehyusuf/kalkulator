<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animasi Sepeda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        h1 {
            color: #e94560;
            font-size: 1.5rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .scene {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 300px;
        }

        /* Stars */
        .stars {
            position: absolute;
            width: 100%;
            height: 60%;
            top: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        /* Moon */
        .moon {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 50px;
            height: 50px;
            background: #f5f5f5;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(245,245,245,0.3);
        }

        /* Ground/Road */
        .ground {
            position: absolute;
            bottom: 40px;
            width: 100%;
            height: 2px;
            background: #e94560;
            opacity: 0.6;
        }

        .road-lines {
            position: absolute;
            bottom: 36px;
            width: 100%;
            height: 2px;
            display: flex;
            gap: 60px;
            animation: roadMove 1.5s linear infinite;
        }
        .line {
            width: 30px;
            height: 2px;
            background: #e94560;
            opacity: 0.4;
        }
        @keyframes roadMove {
            from { transform: translateX(100%); }
            to { transform: translateX(-100px); }
        }

        /* Bicycle container */
        .bike {
            position: absolute;
            bottom: 42px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 130px;
            animation: bob 2s ease-in-out infinite;
        }
        @keyframes bob {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-3px); }
        }

        /* Wheels */
        .wheel {
            position: absolute;
            bottom: 0;
            width: 60px;
            height: 60px;
            border: 3px solid #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        .wheel::before, .wheel::after {
            content: '';
            position: absolute;
            background: #e94560;
        }
        .wheel::before {
            top: 50%; left: 10%; right: 10%;
            height: 2px;
            transform: translateY(-50%);
        }
        .wheel::after {
            left: 50%; top: 10%; bottom: 10%;
            width: 2px;
            transform: translateX(-50%);
        }
        .wheel-left { left: 0; }
        .wheel-right { right: 0; }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Frame */
        .frame {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            height: 60px;
        }
        .frame svg {
            width: 100%;
            height: 100%;
        }
        .frame path {
            fill: none;
            stroke: #e94560;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px rgba(233,69,96,0.4));
        }

        /* Seat & Handle */
        .seat, .handle {
            position: absolute;
            background: #e94560;
            border-radius: 4px;
        }
        .seat {
            bottom: 85px;
            left: 55px;
            width: 24px;
            height: 6px;
        }
        .handle {
            bottom: 100px;
            right: 50px;
            width: 20px;
            height: 4px;
            transform: rotate(-15deg);
        }

        /* Pedals */
        .pedal {
            position: absolute;
            bottom: 32px;
            left: 50%;
            width: 2px;
            height: 24px;
            background: #e94560;
            transform-origin: center;
            transform: translateX(-50%);
            animation: pedalSpin 0.8s linear infinite;
        }
        .pedal::before, .pedal::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 4px;
            background: #e94560;
            border-radius: 2px;
            left: 50%;
            transform: translateX(-50%);
        }
        .pedal::before { top: -2px; }
        .pedal::after { bottom: -2px; }

        @keyframes pedalSpin {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(360deg); }
        }

        .back-link {
            margin-top: 40px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .back-link:hover { color: #e94560; }
    </style>
</head>
<body>
    <h1>🚲 Animasi Sepeda</h1>

    <div class="scene">
        <!-- Stars -->
        <div class="stars">
            <div class="star" style="width:2px;height:2px;top:10%;left:20%;animation-delay:0s"></div>
            <div class="star" style="width:3px;height:3px;top:30%;left:60%;animation-delay:0.5s"></div>
            <div class="star" style="width:2px;height:2px;top:15%;left:80%;animation-delay:1s"></div>
            <div class="star" style="width:2px;height:2px;top:40%;left:10%;animation-delay:1.5s"></div>
            <div class="star" style="width:3px;height:3px;top:25%;left:40%;animation-delay:0.3s"></div>
        </div>

        <!-- Moon -->
        <div class="moon"></div>

        <!-- Road -->
        <div class="ground"></div>
        <div class="road-lines">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>

        <!-- Bicycle -->
        <div class="bike">
            <div class="wheel wheel-left"></div>
            <div class="wheel wheel-right"></div>
            <div class="seat"></div>
            <div class="handle"></div>
            <div class="pedal"></div>
            <div class="frame">
                <svg viewBox="0 0 140 70">
                    <path d="M30 55 L55 20 L95 20 L110 55 M55 20 L45 55 M95 20 L70 55 L45 55 M70 55 L70 35"/>
                </svg>
            </div>
        </div>
    </div>

    <a href="./index.html" class="back-link">← Kembali ke Menu</a>
</body>
</html>
