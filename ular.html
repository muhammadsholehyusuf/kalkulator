<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#764ba2">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <title>Game Ular</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 95vw;
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .score-board {
            display: flex;
            gap: 30px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .score-board span {
            color: #26de81;
        }

        canvas {
            background: #0d0d0d;
            border-radius: 12px;
            border: 2px solid #3d3d3d;
            display: block;
        }

        .controls {
            display: none;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 8px;
            margin-top: 10px;
        }

        .controls button {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 12px;
            background: #2d2d2d;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:active {
            background: #26de81;
            transform: scale(0.92);
        }

        .controls button:nth-child(1) { grid-column: 2; grid-row: 1; }
        .controls button:nth-child(2) { grid-column: 1; grid-row: 2; }
        .controls button:nth-child(3) { grid-column: 3; grid-row: 2; }
        .controls button:nth-child(4) { grid-column: 2; grid-row: 3; }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            color: white;
            text-align: center;
            z-index: 10;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #26de81;
        }

        .overlay p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #ccc;
        }

        .overlay button {
            padding: 12px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 10px;
            background: #26de81;
            color: #1e1e1e;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .overlay button:hover {
            background: #20c974;
            transform: translateY(-2px);
        }

        .canvas-wrapper {
            position: relative;
        }

        @media (max-width: 500px) {
            .controls {
                display: grid;
            }
            h1 {
                font-size: 1.4rem;
            }
            canvas {
                width: 90vw;
                height: 90vw;
            }
        }

        .back-link {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: opacity 0.2s;
        }
        .back-link:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 Game Ular</h1>
        <div class="score-board">
            <div>Skor: <span id="score">0</span></div>
            <div>Rekor: <span id="highScore">0</span></div>
        </div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div class="overlay" id="overlay">
                <h2 id="overlayTitle">Game Ular</h2>
                <p id="overlayText">Gunakan tombol panah / WASD atau tombol sentuh di bawah untuk bermain</p>
                <button onclick="startGame()">Mulai</button>
            </div>
        </div>
        <div class="controls">
            <button onclick="setDirection('up')">▲</button>
            <button onclick="setDirection('left')">◀</button>
            <button onclick="setDirection('right')">▶</button>
            <button onclick="setDirection('down')">▼</button>
        </div>
        <a href="./index.html" class="back-link">← Kembali ke Menu</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayText = document.getElementById('overlayText');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameInterval;
        let isPlaying = false;
        let speed = 200;

        highScoreEl.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            speed = 200;
            scoreEl.textContent = score;
            placeFood();
        }

        function placeFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
            }
        }

        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#0d0d0d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#26de81';
                    ctx.shadowColor = '#26de81';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.fillStyle = '#20c974';
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
                ctx.shadowBlur = 0;
            });

            // Draw food
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function updateGame() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                placeFood();
                // Increase speed
                if (speed > 90) {
                    speed -= 2;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(gameLoop, speed);
                }
            } else {
                snake.pop();
            }
        }

        function gameLoop() {
            updateGame();
            drawGame();
        }

        function startGame() {
            if (isPlaying) return;
            initGame();
            isPlaying = true;
            overlay.style.display = 'none';
            gameInterval = setInterval(gameLoop, speed);
        }

        function gameOver() {
            isPlaying = false;
            clearInterval(gameInterval);
            overlayTitle.textContent = 'Game Over!';
            overlayText.textContent = `Skor Akhir: ${score}`;
            overlay.querySelector('button').textContent = 'Main Lagi';
            overlay.style.display = 'flex';
        }

        function setDirection(dir) {
            if (!isPlaying) {
                startGame();
                // After starting, immediately apply direction if game just started
                // But we need to prevent reversing direction
            }
            switch (dir) {
                case 'up':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'down':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'left':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'right':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!isPlaying && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(e.key)) {
                startGame();
            }
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy === 0) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy === 0) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx === 0) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx === 0) { dx = 1; dy = 0; }
                    break;
            }
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then((registration) => console.log('Service Worker registered'))
                .catch((error) => console.log('Service Worker registration failed'));
        }

        // Initial draw
        drawGame();
    </script>
</body>
</html>
